<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>おはようルーティン</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;min-height:100vh}
.screen{display:none;max-width:430px;margin:0 auto;padding:48px 20px 40px}
.screen.active{display:block}

.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.header h1{font-size:1.4rem;font-weight:700}
.icon-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.icon-btn:hover{background:rgba(255,255,255,.15)}
.icon-btn svg{width:18px;height:18px}

.asset-card{border-radius:18px;padding:18px;margin-bottom:20px;border:1px solid rgba(255,255,255,.06)}
.asset-card.pos{background:rgba(6,78,59,.35);border-color:rgba(52,211,153,.15)}
.asset-card.neg{background:rgba(69,10,10,.35);border-color:rgba(248,113,113,.15)}
.asset-card.empty{background:rgba(255,255,255,.04);text-align:center;padding:24px;color:rgba(255,255,255,.3);font-size:.8rem;line-height:1.8}
.asset-label{font-size:.72rem;color:rgba(255,255,255,.35);margin-bottom:4px}
.asset-amount{font-size:2rem;font-weight:700}
.asset-amount.pos{color:#34d399}.asset-amount.neg{color:#f87171}
.asset-rate{font-size:.85rem;margin-left:8px}
.asset-rate.pos{color:#10b981}.asset-rate.neg{color:#ef4444}
.asset-total{font-size:.7rem;color:rgba(255,255,255,.25);margin-top:6px}
.asset-items{margin-top:10px;display:flex;flex-direction:column;gap:3px}
.asset-item{display:flex;justify-content:space-between;font-size:.72rem;color:rgba(255,255,255,.4)}
.pos-txt{color:#34d399}.neg-txt{color:#f87171}

.now-playing{border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);padding:18px;min-height:90px;display:flex;flex-direction:column;justify-content:center;margin-bottom:14px}
.np-hint{text-align:center;font-size:.8rem;color:rgba(255,255,255,.25)}
.np-num{font-size:.7rem;color:rgba(255,255,255,.25);margin-bottom:4px}
.np-title{font-size:.85rem;font-weight:600;line-height:1.5}
.np-body{font-size:.72rem;color:rgba(255,255,255,.45);margin-top:6px;line-height:1.6}

.progress-bar{height:3px;border-radius:99px;background:rgba(255,255,255,.08);margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:rgba(255,255,255,.4);border-radius:99px;transition:width .4s}

.controls{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:20px}
.ctrl-btn{border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:rgba(255,255,255,.08);color:#f0f0f0;border-radius:50%}
.ctrl-btn:hover{background:rgba(255,255,255,.18)}
.ctrl-btn.sm{width:46px;height:46px}
.ctrl-btn.md{width:60px;height:60px;background:#f0f0f0;color:#0f0f0f}
.ctrl-btn.md:hover{background:rgba(240,240,240,.85)}
.ctrl-btn.lg{width:76px;height:76px;background:#f0f0f0;color:#0f0f0f;font-size:.85rem;font-weight:700}
.ctrl-btn.lg:hover{background:rgba(240,240,240,.85)}
.ctrl-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.ctrl-btn svg{width:20px;height:20px}
.ctrl-btn.sm svg{width:17px;height:17px}

.news-list{display:flex;flex-direction:column;gap:4px}
.news-item{padding:8px 12px;border-radius:12px;font-size:.72rem;color:rgba(255,255,255,.35);line-height:1.5}
.news-item.current{background:rgba(255,255,255,.1);color:#f0f0f0}
.news-item.done{text-decoration:line-through;color:rgba(255,255,255,.15)}
.news-num{margin-right:6px;color:rgba(255,255,255,.15)}

/* Settings */
.back-btn{display:flex;align-items:center;gap:8px;margin-bottom:28px;cursor:pointer;color:rgba(255,255,255,.5);font-size:.85rem;background:none;border:none}
.back-btn:hover{color:#f0f0f0}
.back-btn svg{width:16px;height:16px}
.section-label{font-size:.7rem;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.hint{font-size:.7rem;color:rgba(255,255,255,.25);margin-bottom:10px;line-height:1.6}
.card{background:rgba(255,255,255,.05);border-radius:18px;padding:16px;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px 12px;color:#f0f0f0;font-size:.82rem;outline:none;font-family:inherit}
.form-input::placeholder{color:rgba(255,255,255,.2)}
.form-input:focus{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.1)}
.btn-add{width:100%;padding:11px;border-radius:12px;background:#f0f0f0;color:#0f0f0f;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:opacity .15s;font-family:inherit}
.btn-add:hover{opacity:.85}
.holding-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.04);margin-bottom:6px}
.holding-name{font-size:.82rem;font-weight:500}
.holding-sub{font-size:.68rem;color:rgba(255,255,255,.3);margin-top:1px}
.del-btn{background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;padding:4px;line-height:0;transition:color .15s}
.del-btn:hover{color:#f87171}
.del-btn svg{width:14px;height:14px}
.range-header{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:4px}
.range-val{color:rgba(255,255,255,.4)}
input[type=range]{width:100%;accent-color:#f0f0f0;margin:4px 0 2px}
.range-ends{display:flex;justify-content:space-between;font-size:.68rem;color:rgba(255,255,255,.2);margin-bottom:14px}
.btn-save{width:100%;padding:13px;border-radius:14px;background:#f0f0f0;color:#0f0f0f;border:none;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-save:hover{opacity:.85}
.news-loading{text-align:center;font-size:.75rem;color:rgba(255,255,255,.3);padding:8px 0}
</style>
</head>
<body>

<!-- Main -->
<div id="screen-main" class="screen active">
  <div class="header">
    <h1>朝のダイジェスト</h1>
    <button class="icon-btn" id="settings-btn">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
    </button>
  </div>

  <div id="asset-card"></div>

  <div class="now-playing" id="now-playing">
    <p class="np-hint">STARTで読み上げ開始</p>
  </div>

  <div class="progress-bar" id="progress-bar" style="display:none">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="controls" id="controls">
    <button class="ctrl-btn lg" id="start-btn">START</button>
  </div>

  <div id="news-status" class="news-loading"></div>
  <div class="news-list" id="news-list"></div>
</div>

<!-- Settings -->
<div id="screen-settings" class="screen">
  <button class="back-btn" id="back-btn">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
    </svg>
    戻る
  </button>
  <h1 style="font-size:1.3rem;font-weight:700;margin-bottom:24px">設定</h1>

  <div class="section-label">保有銘柄</div>
  <p class="hint">国内株: <code>7203.T</code>　米国株: <code>AAPL</code>　投信: <code>0331418A.T</code></p>
  <div class="card">
    <div class="form-grid">
      <input class="form-input" type="text" id="f-symbol" placeholder="ティッカー (例: 7203.T)"/>
      <input class="form-input" type="text" id="f-name" placeholder="銘柄名 (例: トヨタ)"/>
    </div>
    <div class="form-grid">
      <input class="form-input" type="number" id="f-shares" placeholder="保有口数"/>
      <input class="form-input" type="number" id="f-cost" placeholder="取得単価 (円)"/>
    </div>
    <button class="btn-add" id="add-btn" style="margin-top:8px">＋ 追加</button>
  </div>
  <div id="holdings-list" style="margin-bottom:24px"></div>

  <div class="section-label">読み上げ設定</div>
  <div class="card">
    <div class="range-header"><span>読み上げ速度</span><span class="range-val" id="speed-val">1.0x</span></div>
    <input type="range" id="speed-range" min="0.8" max="1.8" step="0.1" value="1.6"/>
    <div class="range-ends"><span>ゆっくり</span><span>速い</span></div>
    <div class="range-header"><span>ニュース本数</span><span class="range-val" id="news-count-val">7本</span></div>
    <input type="range" id="news-range" min="3" max="10" step="1" value="7"/>
    <div class="range-ends"><span>3本</span><span>10本</span></div>
  </div>
  <button class="btn-save" id="save-btn">設定を保存</button>
</div>

<script>
// ── Storage ──────────────────────────────────────────────────────────────────
const store = {
  getHoldings(){ try{ return JSON.parse(localStorage.getItem("h")||"[]") }catch{ return[] } },
  saveHoldings(v){ localStorage.setItem("h",JSON.stringify(v)) },
  getSettings(){ try{ return{speed:1.6,newsCount:7,...JSON.parse(localStorage.getItem("s")||"{}")} }catch{ return{speed:1.6,newsCount:7} } },
  saveSettings(v){ localStorage.setItem("s",JSON.stringify(v)) },
};

// ── Voice ─────────────────────────────────────────────────────────────────────
// 沢城みゆきっぽく：女性声、やや高め、クリアな発音
function pickVoice(){
  const voices = window.speechSynthesis.getVoices();
  // Sayaka 優先、フォールバックで他の日本語女性声
  const priorities = ["Sayaka","Haruka","Ayumi","Kyoko"];
  for(const p of priorities){
    const v = voices.find(v=>v.name.includes(p));
    if(v) return v;
  }
  return voices.find(v=>v.lang.startsWith("ja")) || null;
}

function speak(text, onEnd){
  window.speechSynthesis.cancel();
  const s = store.getSettings();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "ja-JP";
  utter.rate = s.speed;
  utter.pitch = 0.55;
  utter.volume = 1.0;
  const voice = pickVoice();
  if(voice) utter.voice = voice;
  utter.onend = onEnd;
  utter.onerror = onEnd;
  window.speechSynthesis.speak(utter);
}

// ── News ──────────────────────────────────────────────────────────────────────
// rss2json.com 経由で日経 RSS を取得（CORS 対応）
const NIKKEI_FEEDS = [
  "https://www.nikkei.com/rss/index.rss",           // 日経トップ
  "https://www.nikkei.com/rss/marketedit.rss",      // マーケット
];
const RSS2JSON = "https://api.rss2json.com/v1/api.json?rss_url=";

let newsItems = [];

async function fetchNews(){
  const s = store.getSettings();
  const statusEl = document.getElementById("news-status");
  statusEl.textContent = "ニュースを取得中...";

  const today = new Date();
  today.setHours(0,0,0,0);

  const allItems = [];
  for(const feed of NIKKEI_FEEDS){
    try{
      const ctrl = new AbortController();
      const timer = setTimeout(()=>ctrl.abort(), 5000);
      const res = await fetch(RSS2JSON + encodeURIComponent(feed), {signal: ctrl.signal});
      clearTimeout(timer);
      if(!res.ok) continue;
      const json = await res.json();
      if(json.status !== "ok") continue;
      for(const item of (json.items||[])){
        const pubDate = new Date(item.pubDate);
        // 当日 or 前日のニュースのみ
        const diff = (Date.now() - pubDate.getTime()) / (1000*60*60);
        if(diff <= 24){
          allItems.push({
            title: item.title?.replace(/\s+/g," ").trim() || "",
            summary: (item.description||"").replace(/<[^>]+>/g,"").replace(/\s+/g," ").slice(0,100).trim(),
            url: item.link || "",
            pubDate,
          });
        }
      }
    } catch(e){ console.warn(feed, e); }
  }

  // 重複除去 & 新しい順
  const seen = new Set();
  const unique = allItems.filter(n=>{ if(seen.has(n.title)) return false; seen.add(n.title); return true; });
  unique.sort((a,b)=>b.pubDate-a.pubDate);

  if(unique.length === 0){
    statusEl.textContent = "⚠ 最新ニュースを取得できませんでした（デモデータを使用）";
    newsItems = getDemoNews();
  } else {
    statusEl.textContent = "";
    newsItems = unique.slice(0, s.newsCount);
  }
  renderNewsList();
  document.getElementById("start-btn").disabled = false;
}

function getDemoNews(){
  return [
    {title:"日経平均が続伸、半導体関連株がけん引",summary:"前日比350円高。米国市場の上昇を受け、半導体・電子部品関連が幅広く買われた。"},
    {title:"円相場、1ドル157円台に下落",summary:"米雇用統計が予想上回り、ドル買い・円売り進む。"},
    {title:"トヨタ、EV新工場を国内建設へ",summary:"2027年稼働、投資額4000億円規模。国内雇用創出にも期待。"},
    {title:"米AI規制法案、上院で審議入り",summary:"大手テック企業への影響懸念から難航が予想される。"},
    {title:"国内消費者物価、前年比2.8%上昇",summary:"食料品・エネルギーが引き続き上昇。日銀の政策判断に注目。"},
    {title:"楽天グループ、モバイル黒字化を宣言",summary:"契約者数が増加傾向で設備投資の峠を越えた。"},
    {title:"マイクロソフト、日本でデータセンター拡張",summary:"生成AI需要増対応で国内に3000億円規模の追加投資。"},
  ].slice(0, store.getSettings().newsCount);
}

function renderNewsList(){
  document.getElementById("news-list").innerHTML = newsItems.map((n,i)=>`
    <div class="news-item" id="ni-${i}"><span class="news-num">${i+1}</span>${n.title}</div>
  `).join("");
}

// ── Asset ─────────────────────────────────────────────────────────────────────
let assetSpeechText = "";

function renderAssetCard(){
  const el = document.getElementById("asset-card");
  const holdings = store.getHoldings();
  if(!holdings.length){
    el.innerHTML = `<div class="asset-card empty">資産未登録<br><span style="font-size:.68rem">右上の設定から銘柄を追加</span></div>`;
    assetSpeechText = "";
    return;
  }
  // デモ: ランダム変動（Vercel 本番では Yahoo Finance API 経由で実データ取得）
  let totalVal = 0, totalChg = 0;
  const rows = holdings.map(h=>{
    const seed = h.symbol.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
    const rng = ((seed * 9301 + 49297) % 233280) / 233280;
    const rate = (rng * 4 - 1.5) / 100;
    const price = h.avgCost * (1 + rate);
    const chg = (price - h.avgCost) * h.shares;
    totalVal += price * h.shares;
    totalChg += chg;
    return {...h, rate, chg};
  });
  const totalRate = totalVal ? (totalChg/(totalVal-totalChg))*100 : 0;
  const isPos = totalChg >= 0;
  const fmt = n => Math.round(Math.abs(n)).toLocaleString("ja-JP");
  const sign = isPos ? "＋" : "－";

  el.innerHTML = `
    <div class="asset-card ${isPos?"pos":"neg"}">
      <div class="asset-label">本日の資産変動 <span style="color:rgba(255,255,255,.15);font-size:.63rem">（デモ値）</span></div>
      <div>
        <span class="asset-amount ${isPos?"pos":"neg"}">${sign}¥${fmt(totalChg)}</span>
        <span class="asset-rate ${isPos?"pos":"neg"}">${sign}${Math.abs(totalRate).toFixed(2)}%</span>
      </div>
      <div class="asset-total">総資産 ¥${fmt(totalVal)}</div>
      <div class="asset-items">${rows.map(h=>`
        <div class="asset-item">
          <span>${h.name}</span>
          <span class="${h.rate>=0?"pos-txt":"neg-txt"}">${h.rate>=0?"＋":"－"}${Math.abs(h.rate*100).toFixed(1)}%</span>
        </div>`).join("")}
      </div>
    </div>`;

  const s2 = isPos?"プラス":"マイナス";
  assetSpeechText = `資産です。本日${s2}${fmt(totalChg)}円、${s2}${Math.abs(totalRate).toFixed(1)}パーセントです。${rows.map(h=>`${h.name}${h.rate>=0?"プラス":"マイナス"}${Math.abs(h.rate*100).toFixed(1)}パーセント。`).join("")}`;
}

// ── Player ────────────────────────────────────────────────────────────────────
let queue = [], qIdx = 0, stopped = true, paused = false;

function buildQueue(){
  const q = [];
  if(assetSpeechText) q.push(assetSpeechText);
  newsItems.forEach((n,i)=> q.push(`${i+1}本目。${n.title}。${n.summary||""}`));
  q.push("以上です。");
  return q;
}

function startPlayer(){
  stopped = false; paused = false;
  queue = buildQueue();
  qIdx = 0;
  document.getElementById("progress-bar").style.display = "block";
  showPlayControls();
  playNext();
}

function playNext(){
  if(stopped) return;
  if(qIdx >= queue.length){
    document.getElementById("now-playing").innerHTML = `<p style="text-align:center;color:#34d399;font-size:.85rem">✓ 完了！良い一日を！</p>`;
    showStartControls();
    return;
  }
  const offset = assetSpeechText ? 1 : 0;
  const ni = qIdx - offset;
  updateNowPlaying(ni);
  updateProgress(ni);
  speak(queue[qIdx++], ()=>{ if(!stopped && !paused) playNext(); });
}

function updateNowPlaying(ni){
  const el = document.getElementById("now-playing");
  if(ni < 0){
    el.innerHTML = `<p class="np-hint" style="color:rgba(255,255,255,.5)">資産ダイジェスト読み上げ中...</p>`;
    document.querySelectorAll(".news-item").forEach(e=>e.classList.remove("current","done"));
  } else if(ni < newsItems.length){
    const n = newsItems[ni];
    el.innerHTML = `<div class="np-num">${ni+1} / ${newsItems.length}本目</div><div class="np-title">${n.title}</div>${n.summary?`<div class="np-body">${n.summary}</div>`:""}`;
    document.querySelectorAll(".news-item").forEach((e,i)=>{
      e.classList.toggle("current", i===ni);
      e.classList.toggle("done", i<ni);
    });
  } else {
    el.innerHTML = `<p class="np-hint" style="color:rgba(255,255,255,.4)">読み上げ中...</p>`;
  }
}

function updateProgress(ni){
  const pct = newsItems.length > 0 ? Math.max(0, Math.min(100, (ni/newsItems.length)*100)) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
}

function pausePlayer(){
  paused = true;
  window.speechSynthesis.pause();
  document.getElementById("play-pause-btn").innerHTML = playIcon();
  document.getElementById("play-pause-btn").onclick = resumePlayer;
}
function resumePlayer(){
  paused = false;
  window.speechSynthesis.resume();
  document.getElementById("play-pause-btn").innerHTML = pauseIcon();
  document.getElementById("play-pause-btn").onclick = pausePlayer;
}
function skipPlayer(){
  window.speechSynthesis.cancel();
  if(!stopped) playNext();
}
function stopPlayer(){
  stopped = true; paused = false;
  window.speechSynthesis.cancel();
  document.getElementById("progress-bar").style.display = "none";
  document.getElementById("now-playing").innerHTML = `<p class="np-hint">STARTで読み上げ開始</p>`;
  document.querySelectorAll(".news-item").forEach(e=>e.classList.remove("current","done"));
  showStartControls();
}

function showStartControls(){
  document.getElementById("controls").innerHTML = `<button class="ctrl-btn lg" id="start-btn">START</button>`;
  document.getElementById("start-btn").addEventListener("click", startPlayer);
}
function showPlayControls(){
  document.getElementById("controls").innerHTML = `
    <button class="ctrl-btn sm" id="stop-btn"><svg fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12"/></svg></button>
    <button class="ctrl-btn md" id="play-pause-btn">${pauseIcon()}</button>
    <button class="ctrl-btn sm" id="skip-btn"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg></button>`;
  document.getElementById("stop-btn").onclick = stopPlayer;
  document.getElementById("play-pause-btn").onclick = pausePlayer;
  document.getElementById("skip-btn").onclick = skipPlayer;
}
const playIcon = ()=>`<svg fill="currentColor" viewBox="0 0 24 24" width="22" height="22"><path d="M8 5v14l11-7z"/></svg>`;
const pauseIcon = ()=>`<svg fill="currentColor" viewBox="0 0 24 24" width="22" height="22"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

// ── Settings ──────────────────────────────────────────────────────────────────
function openSettings(){
  stopPlayer();
  document.getElementById("screen-main").classList.remove("active");
  document.getElementById("screen-settings").classList.add("active");
  renderSettings();
}
function closeSettings(){
  document.getElementById("screen-settings").classList.remove("active");
  document.getElementById("screen-main").classList.add("active");
  renderAssetCard();
  fetchNews();
}

function renderSettings(){
  const s = store.getSettings();
  document.getElementById("speed-range").value = s.speed;
  document.getElementById("speed-val").textContent = s.speed.toFixed(1)+"x";
  document.getElementById("news-range").value = s.newsCount;
  document.getElementById("news-count-val").textContent = s.newsCount+"本";
  renderHoldings();
}

function renderHoldings(){
  const holdings = store.getHoldings();
  const el = document.getElementById("holdings-list");
  if(!holdings.length){
    el.innerHTML = `<p style="text-align:center;color:rgba(255,255,255,.2);font-size:.78rem;padding:8px 0">銘柄が登録されていません</p>`;
    return;
  }
  el.innerHTML = holdings.map(h=>`
    <div class="holding-row">
      <div>
        <div class="holding-name">${h.name}</div>
        <div class="holding-sub">${h.symbol} · ${h.shares}口 · 取得¥${Number(h.avgCost).toLocaleString()}</div>
      </div>
      <button class="del-btn" data-id="${h.id}">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>`).join("");
  el.querySelectorAll(".del-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const holdings2 = store.getHoldings().filter(h=>h.id!==btn.dataset.id);
      store.saveHoldings(holdings2);
      renderHoldings();
    });
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", ()=>{
  // Navigation
  document.getElementById("settings-btn").addEventListener("click", openSettings);
  document.getElementById("back-btn").addEventListener("click", closeSettings);

  // Start btn
  document.getElementById("start-btn").addEventListener("click", startPlayer);

  // Add holding
  document.getElementById("add-btn").addEventListener("click", ()=>{
    const symbol = document.getElementById("f-symbol").value.trim().toUpperCase();
    const name   = document.getElementById("f-name").value.trim();
    const shares = parseFloat(document.getElementById("f-shares").value);
    const avgCost= parseFloat(document.getElementById("f-cost").value);
    if(!symbol || !name || isNaN(shares) || isNaN(avgCost)){
      document.getElementById("add-btn").textContent = "⚠ すべて入力してください";
      setTimeout(()=>document.getElementById("add-btn").textContent="＋ 追加", 2000);
      return;
    }
    const holdings = store.getHoldings();
    holdings.push({ id: Date.now().toString(), symbol, name, shares, avgCost });
    store.saveHoldings(holdings);
    document.getElementById("f-symbol").value = "";
    document.getElementById("f-name").value   = "";
    document.getElementById("f-shares").value = "";
    document.getElementById("f-cost").value   = "";
    renderHoldings();
  });

  // Range sliders
  document.getElementById("speed-range").addEventListener("input", e=>{
    document.getElementById("speed-val").textContent = parseFloat(e.target.value).toFixed(1)+"x";
  });
  document.getElementById("news-range").addEventListener("input", e=>{
    document.getElementById("news-count-val").textContent = e.target.value+"本";
  });

  // Save settings
  document.getElementById("save-btn").addEventListener("click", ()=>{
    store.saveSettings({
      speed: parseFloat(document.getElementById("speed-range").value),
      newsCount: parseInt(document.getElementById("news-range").value),
    });
    const btn = document.getElementById("save-btn");
    btn.textContent = "✓ 保存しました";
    setTimeout(()=>btn.textContent="設定を保存", 2000);
  });

  // voices may not be ready immediately
  window.speechSynthesis.onvoiceschanged = ()=>{};

  // Init main
  renderAssetCard();
  document.getElementById("start-btn").disabled = true;
  fetchNews();
});
</script>
</body>
</html>
